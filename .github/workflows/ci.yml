name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build site
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  preview:
    name: Deploy PR preview
    runs-on: ubuntu-latest
    needs: quality
    # Fork PRs don't get secrets; only preview same-repo branches.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Upload preview version to Cloudflare Workers
        id: preview
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.110.0"
          # versions upload creates a shareable preview URL without touching
          # the live deployment. Requires "Preview URLs" enabled on the worker.
          command: versions upload --config dist/server/wrangler.json --message "PR #${{ github.event.pull_request.number }}"

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        env:
          WRANGLER_OUTPUT: ${{ steps.preview.outputs.command-output }}
        with:
          script: |
            const output = process.env.WRANGLER_OUTPUT || "";
            const match = output.match(/https:\/\/\S+\.workers\.dev\S*/);
            const url = match ? match[0] : null;
            const body = url
              ? `🔍 **Preview deployed:** ${url}\n\n_Updates on every push to this PR. Preview versions don't affect the live site._`
              : `⚠️ Preview uploaded but no URL found in wrangler output — check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) and confirm Preview URLs are enabled on the worker.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user.type === "Bot" && c.body.includes("Preview")
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin to the wrangler version in package-lock.json — the @astrojs/cloudflare
          # adapter generates config for this version; floating to latest can break
          # (e.g. wrangler 4.111 rejects the legacy_env field the adapter emits).
          wranglerVersion: "4.110.0"
          command: deploy --config dist/server/wrangler.json
