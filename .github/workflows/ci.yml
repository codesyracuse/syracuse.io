name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build site
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        # Redirect all fds so the Astro daemon doesn't hold the step's
        # output pipes open (which makes the runner wait forever).
        run: npm run dev < /dev/null > dev-server.log 2>&1

      - name: Wait for dev server to be ready
        run: |
          echo "Waiting for dev server..."
          for i in $(seq 1 60); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/)
            if [ "$status" = "200" ]; then
              echo "Dev server ready"
              exit 0
            fi
            echo "Attempt $i: HTTP $status"
            sleep 1
          done
          echo "Dev server did not become ready in 60s"
          exit 1

      - name: Run E2E tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
